server {
    listen 80;
    server_name gravegoodsgoodies.com www.gravegoodsgoodies.com;

    # Certbot will add HTTPS redirect here
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gravegoodsgoodies.com www.gravegoodsgoodies.com;

    # Certbot will fill these in
    # ssl_certificate /etc/letsencrypt/live/gravegoodsgoodies.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/gravegoodsgoodies.com/privkey.pem;

    # Proxy all requests to the Docker app container
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Stripe webhook needs raw body — ensure no buffering issues
    location /api/stripe/webhook {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }
}
